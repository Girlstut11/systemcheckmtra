<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Безопасный доступ</title>
    <style>
        body { 
            background: #f4f4f5; color: #111; font-family: -apple-system, sans-serif; 
            padding: 20px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; margin: 0; box-sizing: border-box;
        }
        .box { 
            background: #fff; border-radius: 12px; padding: 25px; width: 100%; 
            max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center; position: relative; z-index: 10;
        }
        h2 { color: #d32f2f; margin-top: 0; margin-bottom: 15px; font-size: 22px; }
        p { color: #555; font-size: 15px; line-height: 1.4; margin-bottom: 25px; }

        .btn { 
            display: block; width: 100%; padding: 16px 10px; border-radius: 8px; 
            text-decoration: none; font-weight: bold; margin-bottom: 15px; 
            box-sizing: border-box; font-size: 15px; text-transform: uppercase;
            border: none; cursor: pointer; transition: 0.2s;
        }
        .btn-blue { background: #1976d2; color: #fff; }
        .btn-green { background: #2e7d32; color: #fff; }

        /* Указатель на компас */
        .arrow-wrapper { 
            position: fixed; bottom: 20px; right: 25px; text-align: center; 
            z-index: 100; animation: bounceDown 1s infinite; display: none; 
            flex-direction: column; align-items: center; 
        }
        .arrow-text { 
            background: #d32f2f; color: #fff; font-weight: bold; 
            padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-transform: uppercase;
        }
        .arrow-icon { font-size: 55px; line-height: 1; text-shadow: 0px 2px 5px rgba(0,0,0,0.2); margin-right: -10px;}
        
        @keyframes bounceDown { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(15px); } 
        }
        
        #instruction-step { 
            display: none; margin-top: 20px; padding: 15px; background: #fff9c4; 
            border-radius: 8px; border: 1px solid #fbc02d; color: #f57f17; 
            font-weight: bold; line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="box" id="main-box">
        <h2>⚠️ Ошибка доступа</h2>
        <p id="main-text">Анкеты не открываются внутри Телеграма. Выберите, где вы сейчас находитесь:</p>

        <button class="btn btn-blue" id="btn-telegram">Я СИЖУ В ТЕЛЕГРАМЕ</button>
        <button class="btn btn-green" id="btn-safari">Я УЖЕ В БРАУЗЕРЕ (SAFARI)</button>

        <div id="instruction-step">
            👇 Нажмите на значок КОМПАСА в правом нижнем углу экрана, чтобы перейти в безопасный браузер!
        </div>
    </div>

    <div class="arrow-wrapper" id="ios-arrow">
        <div class="arrow-text">КОМПАС ТУТ</div>
        <div class="arrow-icon">⬇️</div>
    </div>

    <script>
        var offerUrl = "https://tone.affomelody.com/0wn8qi";
        var androidIntent = "intent://tone.affomelody.com/0wn8qi#Intent;scheme=https;package=com.android.chrome;end";
        
        var ua = navigator.userAgent;
        var isAndroid = /android/i.test(ua);

        // Если Андроид - автоматический прыжок в Chrome без вопросов
        if (isAndroid) {
            document.getElementById('main-box').innerHTML = "<h2>Загрузка...</h2><p>Переводим в безопасный браузер.</p>";
            setTimeout(function(){ window.location.href = androidIntent; }, 500);
        }

        // Кнопка: Пользователь сам говорит, что он в Телеграме
        document.getElementById('btn-telegram').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('btn-safari').style.display = 'none';
            document.getElementById('main-text').style.display = 'none';
            document.getElementById('instruction-step').style.display = 'block';
            document.getElementById('ios-arrow').style.display = 'flex';
        });

        // Кнопка: Пользователь сам говорит, что он в нормальном браузере
        document.getElementById('btn-safari').addEventListener('click', function() {
            window.location.href = offerUrl;
        });
    </script>
</body>
</html>
